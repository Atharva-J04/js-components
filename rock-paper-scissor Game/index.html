<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper scissor game</title>
 <link rel="stylesheet" href="style.css">    
 
</head>
<body>
<div class="match-container">

        <h2 class="headd">Are You Ready for the Match?</h2>

        <div class="players">
            <div class="left">
               <h3 class="lefty">left</h3>
            </div>
            <div class="cross">×</div>
            <div class="right">
               <h3 class="righty">right</h3>
            </div>
        </div>

        <div class="player-names">
            <div class="player">Player 1</div>

            <button class="start-btn">Start</button>

            <div class="player">Player 2</div>
        </div>
       
         <div class="winner-box">
         <h2 class="win">Winner?</h2>
         
         </div>

         <div class="score1">Player 1: 0</div>
        <div class="score2">Player 2: 0</div>
         <div class="draw">draw match : </div>
         <button class="reset">reset</button>
    </div>
<script src="script.js"></script>
</body>
</html>
